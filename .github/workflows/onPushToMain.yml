name: release and publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the version-bump commit this workflow itself pushes to avoid an infinite loop.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@v2
      - name: Setup git
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Bump patch version
        id: bump
        run: |
          new_version=$(npm version patch -m "chore: release %s [skip ci]")
          echo "tag=$new_version" >> "$GITHUB_OUTPUT"
      - name: Build
        run: bun run build
      - name: Prepack
        run: bun run prepack
      - name: Publish to npm
        uses: JS-DevTools/npm-publish@19c28f1ef146469e409470805ea4279d47c3d35c
        with:
          token: ${{ secrets.NPM_TOKEN }}
      - name: Postpack
        run: bun run postpack
      - name: Push commit and tag
        run: git push --follow-tags origin ${{ github.ref_name }}
      - name: Create Github Release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5
        with:
          name: ${{ steps.bump.outputs.tag }}
          tag: ${{ steps.bump.outputs.tag }}
          commit: ${{ github.ref_name }}
          token: ${{ github.token }}
          skipIfReleaseExists: true
